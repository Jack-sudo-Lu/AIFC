<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fact Checker - Verify Information Instantly</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 40px; padding-top: 40px; }
        header h1 { font-size: 3em; margin-bottom: 10px; font-weight: 700; }
        header p { font-size: 1.2em; opacity: 0.9; }
        .main-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            margin-bottom: 30px;
        }
        .input-section h2 { color: #333; margin-bottom: 15px; font-size: 1.5em; }
        textarea {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
        }
        textarea:focus { outline: none; border-color: #667eea; }
        .button-container { text-align: center; margin: 25px 0; }
        .check-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .check-button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6); }
        .check-button:disabled { opacity: 0.6; cursor: not-allowed; }
        .result-section {
            margin-top: 30px;
            padding: 25px;
            border-radius: 15px;
            background: #f8f9fa;
        }
        .result-section.hidden { display: none; }
        .claim-item {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        .claim-text { font-size: 1.1em; color: #333; margin-bottom: 8px; }
        .claim-meta { font-size: 0.9em; color: #666; }
        .claim-meta span { margin-right: 15px; }
        .checkable { color: #155724; background: #d4edda; padding: 2px 8px; border-radius: 4px; }
        .not-checkable { color: #721c24; background: #f8d7da; padding: 2px 8px; border-radius: 4px; }
        h3 { color: #333; margin-bottom: 15px; }
        footer { text-align: center; color: white; margin-top: 40px; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Fact Checker</h1>
            <p>Verify information instantly with advanced AI analysis</p>
        </header>
        <div class="main-card">
            <div class="input-section">
                <h2>Enter a claim to verify</h2>
                <textarea id="claim-input" placeholder="Type or paste any statement, news snippet, or claim you want to fact-check..."></textarea>
            </div>
            <div class="button-container">
                <button class="check-button" id="check-btn">Check Facts</button>
            </div>
            <div class="result-section hidden" id="results">
                <h3>Extracted Claims</h3>
                <div id="claims-list"></div>
            </div>
        </div>
        <footer>
            <p>&copy; 2026 AI Fact Checker. Powered by Advanced AI Technology.</p>
        </footer>
    </div>
    <script>
        const btn = document.getElementById('check-btn');
        const input = document.getElementById('claim-input');
        const results = document.getElementById('results');
        const claimsList = document.getElementById('claims-list');

        btn.addEventListener('click', async () => {
            const text = input.value.trim();
            if (!text) return;

            btn.disabled = true;
            btn.textContent = 'Analyzing...';

            try {
                const res = await fetch('http://localhost:8000/api/extract', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ raw_text: text, source_platform: 'web' })
                });
                const claims = await res.json();

                claimsList.innerHTML = claims.map(c => `
                    <div class="claim-item">
                        <div class="claim-text">${c.claim_text}</div>
                        <div class="claim-meta">
                            <span>Subject: ${c.subject}</span>
                            <span class="${c.is_checkable ? 'checkable' : 'not-checkable'}">
                                ${c.is_checkable ? 'Checkable' : 'Not Checkable'}
                            </span>
                        </div>
                    </div>
                `).join('');

                results.classList.remove('hidden');
            } catch (e) {
                claimsList.innerHTML = '<p style="color:red;">Error connecting to backend. Make sure it is running.</p>';
                results.classList.remove('hidden');
            }

            btn.disabled = false;
            btn.textContent = 'Check Facts';
        });
    </script>
</body>
</html>
